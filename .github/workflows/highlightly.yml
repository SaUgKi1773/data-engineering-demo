name: Bronze ingestion (Highlightly)

on:
  workflow_dispatch:
    inputs:
      leagues:
        description: 'Highlightly league ids, comma-separated (e.g. "223746" = Liga MX). Empty or "all" = every league in config.LEAGUES.'
        required: false
        default: ""
        type: string
      mode:
        description: "Which season lists to refresh. incremental = only the seasons this run touches (the date window's, or the current one). full = every season in scope."
        required: true
        default: "incremental"
        type: choice
        options:
          - incremental
          - full
      from_date:
        description: "Start of the match-detail window (YYYY-MM-DD). Empty = no window; details are fetched newest-first."
        required: false
        default: ""
        type: string
      to_date:
        description: "End of the match-detail window (YYYY-MM-DD). Defaults to today when from_date is set."
        required: false
        default: ""
        type: string
      seasons:
        description: 'Highlightly season years, comma-separated (e.g. "2024,2025"). Overrides the date window.'
        required: false
        default: ""
        type: string
      details_limit:
        description: "Cap match-detail calls this run. Empty = spend whatever the daily budget allows."
        required: false
        default: ""
        type: string
      target_db:
        description: "Target MotherDuck database (e.g. superligaen). Leave empty to use default (superligaen)."
        required: false
        default: ""

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  ingest:
    name: Bronze ingestion (Highlightly)
    runs-on: ubuntu-latest
    # The free plan caps a run at 100 API calls, so it always finishes fast.
    # History is seeded a window at a time by dispatching this manually; the
    # run stops cleanly when the daily quota is spent and resumes next time.
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ingestion
        working-directory: ingestion/highlightly
        env:
          LEAGUES:              ${{ github.event.inputs.leagues }}
          SEASONS:              ${{ github.event.inputs.seasons }}
          FROM_DATE:            ${{ github.event.inputs.from_date }}
          TO_DATE:              ${{ github.event.inputs.to_date }}
          DETAILS_LIMIT:        ${{ github.event.inputs.details_limit }}
          HIGHLIGHTLY_API_KEY:  ${{ secrets.HIGHLIGHTLY_API_KEY }}
          MOTHERDUCK_TOKEN:     ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          ARGS="--mode ${{ github.event.inputs.mode }}"
          LEAGUES="${LEAGUES// /}"
          if [ -n "$LEAGUES" ]; then
            ARGS="$ARGS --leagues $LEAGUES"
          fi
          SEASONS="${SEASONS// /}"
          if [ -n "$SEASONS" ]; then
            ARGS="$ARGS --seasons $SEASONS"
          fi
          if [ -n "$FROM_DATE" ]; then
            ARGS="$ARGS --from-date $FROM_DATE"
          fi
          if [ -n "$TO_DATE" ]; then
            ARGS="$ARGS --to-date $TO_DATE"
          fi
          if [ -n "$DETAILS_LIMIT" ]; then
            ARGS="$ARGS --details-limit $DETAILS_LIMIT"
          fi
          DB="md:${{ github.event.inputs.target_db || 'superligaen' }}"
          echo "Running: python run.py $ARGS --db $DB"
          python run.py $ARGS --db $DB
