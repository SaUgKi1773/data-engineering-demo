name: Bronze ingestion (Highlightly / Liga MX)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Load mode. incremental = current season list + backfill chip; full = re-list every season in scope."
        required: true
        default: "incremental"
        type: choice
        options:
          - incremental
          - full
      seasons:
        description: 'Highlightly season years, comma-separated (e.g. "2024,2025"). Empty = all in scope (2024+).'
        required: false
        default: ""
        type: string
      details_limit:
        description: "Cap match-detail calls this run. Empty = spend whatever the daily budget allows."
        required: false
        default: ""
        type: string
      target_db:
        description: "Target MotherDuck database (e.g. superligaen). Leave empty to use default (superligaen)."
        required: false
        default: ""

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  ingest:
    name: Bronze ingestion (Highlightly / Liga MX)
    runs-on: ubuntu-latest
    # The free plan caps the run at 100 API calls, so it always finishes fast —
    # the historical backfill spreads over nightly runs, not one long job.
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ingestion
        working-directory: ingestion/highlightly
        env:
          SEASONS:              ${{ github.event.inputs.seasons }}
          DETAILS_LIMIT:        ${{ github.event.inputs.details_limit }}
          HIGHLIGHTLY_API_KEY:  ${{ secrets.HIGHLIGHTLY_API_KEY }}
          MOTHERDUCK_TOKEN:     ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          ARGS="--mode ${{ github.event.inputs.mode }}"
          SEASONS="${SEASONS// /}"
          if [ -n "$SEASONS" ]; then
            ARGS="$ARGS --seasons $SEASONS"
          fi
          if [ -n "$DETAILS_LIMIT" ]; then
            ARGS="$ARGS --details-limit $DETAILS_LIMIT"
          fi
          DB="md:${{ github.event.inputs.target_db || 'superligaen' }}"
          echo "Running: python run.py $ARGS --db $DB"
          python run.py $ARGS --db $DB
