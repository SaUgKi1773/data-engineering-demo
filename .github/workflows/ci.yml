name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Validate Python syntax
        run: |
          uv run python -m py_compile ingestion/sportmonks/run.py
          uv run python -m py_compile ingestion/sportmonks/api.py
          uv run python -m py_compile ingestion/sportmonks/db.py
          uv run python -m py_compile ingestion/sportmonks/config.py
          uv run python -m py_compile ingestion/sportmonks/ingest_static.py
          uv run python -m py_compile ingestion/sportmonks/ingest_standings.py
          uv run python -m py_compile ingestion/sportmonks/ingest_fixtures.py

      - name: Create local DuckDB for compile
        run: uv run python -c "import duckdb; duckdb.connect('local_dev.duckdb').close()"

      - name: dbt deps
        working-directory: dbt
        run: uv run dbt deps

      - name: dbt compile
        working-directory: dbt
        run: uv run dbt compile --target local
