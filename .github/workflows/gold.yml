name: Gold transformation

on:
  workflow_dispatch:
    inputs:
      full_load:
        description: "Set to 'true' to fully rebuild the fact table from current silver"
        required: false
        default: "false"
      lookback:
        description: "Days to look back for incremental fact window (default: 2)"
        required: false
        default: "2"
      target_db:
        description: "Target MotherDuck database (e.g. superligaen). Leave empty to use default (superligaen)."
        required: false
        default: ""

jobs:
  gold:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build gold (incremental)
        if: ${{ github.event.inputs.full_load != 'true' }}
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          TARGET_DB: ${{ github.event.inputs.target_db || 'superligaen' }}
        run: python transformations/run_gold.py --lookback ${{ github.event.inputs.lookback || '2' }}

      - name: Build gold (full load)
        if: ${{ github.event.inputs.full_load == 'true' }}
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          TARGET_DB: ${{ github.event.inputs.target_db || 'superligaen' }}
        run: python transformations/run_gold.py --full-load
