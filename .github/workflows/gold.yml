name: Gold transformation

on:
  workflow_dispatch:
    inputs:
      full_load:
        description: "Set to 'true' to fully rebuild the dimensional model from current silver"
        required: false
        default: "false"
      season:
        description: "Season year for seasonal load (e.g. 2025). Leave empty to use rolling window."
        required: false
        default: ""
      lookback:
        description: "Days to look back for incremental window (default: 2)"
        required: false
        default: "2"
      target_db:
        description: "Target MotherDuck database (superligaen or superligaen_dev). Default: superligaen."
        required: false
        default: ""

jobs:
  gold:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: dbt deps
        working-directory: dbt
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: dbt deps

      - name: Build gold (incremental)
        if: ${{ github.event.inputs.full_load != 'true' }}
        working-directory: dbt
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          TARGET=$([ "${{ github.event.inputs.target_db || 'superligaen' }}" = "superligaen" ] && echo "prod" || echo "dev")
          dbt run --select 'gold.*' --target $TARGET --vars '{"lookback_days": ${{ github.event.inputs.lookback || '2' }}}'

      - name: Build gold (seasonal load)
        if: ${{ github.event.inputs.full_load == 'true' && github.event.inputs.season != '' }}
        working-directory: dbt
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          TARGET=$([ "${{ github.event.inputs.target_db || 'superligaen' }}" = "superligaen" ] && echo "prod" || echo "dev")
          dbt run --select 'gold.*' --target $TARGET --vars '{"season": ${{ github.event.inputs.season }}}'

      - name: Build gold (full refresh)
        if: ${{ github.event.inputs.full_load == 'true' && github.event.inputs.season == '' }}
        working-directory: dbt
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          TARGET=$([ "${{ github.event.inputs.target_db || 'superligaen' }}" = "superligaen" ] && echo "prod" || echo "dev")
          dbt run --select 'gold.*' --target $TARGET --full-refresh
