name: Match predictions

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Set to 'true' to overwrite predictions already published today."
        required: false
        default: "false"
      target_db:
        description: "Target MotherDuck database (e.g. superligaen). Leave empty to use default (superligaen)."
        required: false
        default: ""

jobs:
  # ---------------------------------------------------------------------------
  # Data science — publish match outcome predictions to bronze
  # ---------------------------------------------------------------------------
  publish_predictions:
    name: Publish predictions
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Publish predictions
        run: |
          DB="${{ github.event.inputs.target_db || 'superligaen' }}"
          EXTRA_ARGS=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --force"
          fi
          python ingestion/datascience/predict_match_outcomes.py --db "$DB" $EXTRA_ARGS
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}

  # ---------------------------------------------------------------------------
  # BI integration — parse bronze into silver + gold, enforce the data contract
  # ---------------------------------------------------------------------------
  prediction_models:
    name: Prediction dbt models
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: publish_predictions

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: dbt deps
        working-directory: dbt
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: dbt deps

      - name: Build prediction silver and gold models
        working-directory: dbt
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          DB="${{ github.event.inputs.target_db || 'superligaen' }}"
          if [[ "$DB" == "superligaen" ]]; then TARGET=prod
          elif [[ "$DB" == "superligaen_dev" ]]; then TARGET=dev
          else echo "Unknown target_db: $DB" && exit 1; fi
          dbt run --select silver.ds_match_predictions gold.dims.dim_prediction_model gold.fct_match_predictions --target $TARGET

      - name: Enforce the prediction data contract
        working-directory: dbt
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          DB="${{ github.event.inputs.target_db || 'superligaen' }}"
          if [[ "$DB" == "superligaen" ]]; then TARGET=prod
          elif [[ "$DB" == "superligaen_dev" ]]; then TARGET=dev
          else echo "Unknown target_db: $DB" && exit 1; fi
          dbt test --select silver.ds_match_predictions gold.fct_match_predictions --target $TARGET

  # ---------------------------------------------------------------------------
  # Dashboard — trigger Vercel rebuild
  # ---------------------------------------------------------------------------
  publish:
    name: Publish dashboard (Vercel)
    runs-on: ubuntu-latest
    needs: prediction_models
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to Vercel deploy branch
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git checkout -B publish_dashboard/vercel origin/main
          git commit --allow-empty -m "chore: predictions refresh $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin publish_dashboard/vercel --force
