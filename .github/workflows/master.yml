name: Nightly pipeline

on:
  schedule:
    - cron: "0 23 * * *"  # 23:00 UTC = midnight Danish time (CET) — after matches finish
  workflow_dispatch:
    inputs:
      full_load:
        description: "Set to 'true' to run a full historical load"
        required: false
        default: "false"
      league:
        description: "League ID (e.g. 119). Leave empty to load all leagues."
        required: false
        default: ""
      season:
        description: "Season year for full load (e.g. 2025). Leave empty to load all seasons."
        required: false
        default: ""
      lookback:
        description: "Days to look back for incremental runs (default: 5)"
        required: false
        default: "5"
      target_db:
        description: "Target MotherDuck database (e.g. superligaen). Leave empty to use default (superligaen)."
        required: false
        default: ""

jobs:
  # ---------------------------------------------------------------------------
  # Bronze — ingest raw API data
  # ---------------------------------------------------------------------------
  ingest:
    name: Bronze ingestion
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6h max — covers one full season load

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ingestion (incremental)
        if: ${{ github.event.inputs.full_load != 'true' }}
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          TARGET_DB: ${{ github.event.inputs.target_db || 'superligaen' }}
        run: python ingestion/run.py --lookback ${{ github.event.inputs.lookback || '5' }}

      - name: Run ingestion (full load)
        if: ${{ github.event.inputs.full_load == 'true' }}
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          TARGET_DB: ${{ github.event.inputs.target_db || 'superligaen' }}
        run: |
          ARGS="--full-load"
          [ -n "${{ github.event.inputs.league }}" ] && ARGS="$ARGS --league ${{ github.event.inputs.league }}"
          [ -n "${{ github.event.inputs.season }}" ] && ARGS="$ARGS --season ${{ github.event.inputs.season }}"
          python ingestion/run.py $ARGS

  # ---------------------------------------------------------------------------
  # Silver — transform bronze JSON into structured tables
  # ---------------------------------------------------------------------------
  transform:
    name: Silver transformation
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: ingest  # only runs if ingest succeeds

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run silver transformation (incremental)
        if: ${{ github.event.inputs.full_load != 'true' }}
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          TARGET_DB: ${{ github.event.inputs.target_db || 'superligaen' }}
        run: python transformations/run_silver.py --lookback ${{ github.event.inputs.lookback || '5' }}

      - name: Run silver transformation (full / seasonal load)
        if: ${{ github.event.inputs.full_load == 'true' }}
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          TARGET_DB: ${{ github.event.inputs.target_db || 'superligaen' }}
        run: |
          ARGS="--full-load"
          [ -n "${{ github.event.inputs.league }}" ] && ARGS="$ARGS --league ${{ github.event.inputs.league }}"
          [ -n "${{ github.event.inputs.season }}" ] && ARGS="$ARGS --season ${{ github.event.inputs.season }}"
          python transformations/run_silver.py $ARGS

  # ---------------------------------------------------------------------------
  # Gold — build Kimball dimensional model
  # ---------------------------------------------------------------------------
  gold:
    name: Gold transformation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: transform  # only runs if silver succeeds

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build gold (incremental)
        if: ${{ github.event.inputs.full_load != 'true' }}
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          TARGET_DB: ${{ github.event.inputs.target_db || 'superligaen' }}
        run: python transformations/run_gold.py --lookback ${{ github.event.inputs.lookback || '5' }}

      - name: Build gold (full load)
        if: ${{ github.event.inputs.full_load == 'true' }}
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          TARGET_DB: ${{ github.event.inputs.target_db || 'superligaen' }}
        run: python transformations/run_gold.py --full-load

  # ---------------------------------------------------------------------------
  # Dashboard — build and deploy to Netlify after gold is fresh
  # ---------------------------------------------------------------------------
  publish:
    name: Publish dashboard (Netlify)
    runs-on: ubuntu-latest
    needs: gold

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: dashboards
        run: npm install

      - name: Write MotherDuck token
        working-directory: dashboards
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          echo "token: $(echo -n "$MOTHERDUCK_TOKEN" | base64 -w 0)" > sources/superligaen/connection.options.yaml

      - name: Build sources
        working-directory: dashboards
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: npm run sources

      - name: Build dashboard
        working-directory: dashboards
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: npm run build

      - name: Deploy to Netlify
        working-directory: dashboards
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: npx netlify-cli deploy --dir=build --prod
