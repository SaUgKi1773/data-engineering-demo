name: Nightly pipeline

on:
  schedule:
    - cron: "0 23 * * *"  # 23:00 UTC = midnight Danish time (CET) — after matches finish
  workflow_dispatch:
    inputs:
      full_load:
        description: "Set to 'true' to run a full historical load"
        required: false
        default: "false"
      target_db:
        description: "Target MotherDuck database (e.g. superligaen). Leave empty to use default (superligaen)."
        required: false
        default: ""
      all_discussions:
        description: "Set to 'true' to generate AI discussions for all completed rounds in the season (not just the latest)."
        required: false
        default: "false"
      force_discussions:
        description: "Set to 'true' to overwrite existing AI discussions (re-generates even if already in bronze)."
        required: false
        default: "false"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  INCREMENTAL_DAYS_BACK: '7'   # single source of truth — bronze and gold both inherit this

jobs:
  # ---------------------------------------------------------------------------
  # Bronze — ingest raw API data from Sportmonks
  # ---------------------------------------------------------------------------
  ingest:
    name: Bronze ingestion (Sportmonks)
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6h max — covers a full load

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ingestion
        working-directory: ingestion/sportmonks
        run: |
          DB="md:${{ github.event.inputs.target_db || 'superligaen' }}"
          if [ "${{ github.event.inputs.full_load }}" = "true" ]; then
            python run.py --mode full --db $DB
          else
            python run.py --mode incremental --db $DB
          fi
        env:
          SPORTMONKS_API_KEY: ${{ secrets.SPORTMONKS_API_KEY }}
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}

  # ---------------------------------------------------------------------------
  # AI discussions — generate fan forum posts into bronze, parallel to ingest.
  # Reads the previous night's gold, so discussions for a round land the night
  # after the round completes.
  # ---------------------------------------------------------------------------
  ai_discussions:
    name: Bronze ingestion (AI discussions)
    runs-on: ubuntu-latest
    timeout-minutes: 120  # all_discussions backfill can take ~45 min per season

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate discussions for latest round
        run: |
          DB="${{ github.event.inputs.target_db || 'superligaen' }}"
          SEASON=$(python -c "import duckdb,os; con=duckdb.connect('md:'+os.environ['DB']+'?motherduck_token='+os.environ['MOTHERDUCK_TOKEN']); row=con.execute('SELECT season FROM '+os.environ['DB']+'.gold.dim_date WHERE is_current_season ORDER BY date DESC LIMIT 1').fetchone(); print(row[0] if row else '')")
          if [ -z "$SEASON" ]; then echo "No current season found" && exit 1; fi
          echo "Generating discussions for season: $SEASON"
          EXTRA_ARGS=""
          if [ "${{ github.event.inputs.all_discussions }}" = "true" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --all-rounds"
          fi
          if [ "${{ github.event.inputs.force_discussions }}" = "true" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --force"
          fi
          python ingestion/groq/generate_round_discussions.py --season "$SEASON" --db "$DB" $EXTRA_ARGS
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          GROQ_API_KEY:     ${{ secrets.GROQ_API_KEY }}
          DB:               ${{ github.event.inputs.target_db || 'superligaen' }}

  # ---------------------------------------------------------------------------
  # Match predictions — the "data science team" writes win/draw/loss
  # probabilities for upcoming fixtures into bronze, parallel to ingest.
  # Reads the previous night's gold, so predictions for newly announced
  # fixtures land the night after the fixtures do.
  # ---------------------------------------------------------------------------
  match_predictions:
    name: Bronze ingestion (match predictions)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Predict upcoming fixtures
        run: |
          DB="${{ github.event.inputs.target_db || 'superligaen' }}"
          python ingestion/datascience/predict_match_outcomes.py --db "$DB"
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}

  # ---------------------------------------------------------------------------
  # Highlightly (Liga MX) — second data provider, parallel to the Sportmonks
  # ingest and independent of it. The free plan allows 100 calls/day, so this
  # refreshes the current season and spends the rest of the budget chipping at
  # the historical backfill; it reaches full coverage over roughly a week of
  # nightly runs rather than in a single job.
  # ---------------------------------------------------------------------------
  highlightly:
    name: Bronze ingestion (Highlightly / Liga MX)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ingestion
        working-directory: ingestion/highlightly
        run: |
          DB="md:${{ github.event.inputs.target_db || 'superligaen' }}"
          if [ "${{ github.event.inputs.full_load }}" = "true" ]; then
            python run.py --mode full --db $DB
          else
            python run.py --mode incremental --db $DB
          fi
        env:
          HIGHLIGHTLY_API_KEY: ${{ secrets.HIGHLIGHTLY_API_KEY }}
          MOTHERDUCK_TOKEN:    ${{ secrets.MOTHERDUCK_TOKEN }}

  # ---------------------------------------------------------------------------
  # Silver — transform bronze JSON into structured tables (dbt).
  # Waits for all bronze ingestions; a failed AI generation, prediction or
  # Highlightly run shows red but does not block the pipeline (that data just
  # stays stale).
  # ---------------------------------------------------------------------------
  transform:
    name: Silver transformation
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [ingest, ai_discussions, match_predictions, highlightly]
    if: ${{ !cancelled() && needs.ingest.result == 'success' }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: dbt deps
        working-directory: dbt
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: dbt deps

      - name: Load seeds
        working-directory: dbt
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          DB="${{ github.event.inputs.target_db || 'superligaen' }}"
          if [[ "$DB" == "superligaen" ]]; then TARGET=prod
          elif [[ "$DB" == "superligaen_dev" ]]; then TARGET=dev
          else echo "Unknown target_db: $DB" && exit 1; fi
          dbt seed --target $TARGET

      - name: Run silver
        working-directory: dbt
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          DB="${{ github.event.inputs.target_db || 'superligaen' }}"
          if [[ "$DB" == "superligaen" ]]; then TARGET=prod
          elif [[ "$DB" == "superligaen_dev" ]]; then TARGET=dev
          else echo "Unknown target_db: $DB" && exit 1; fi
          if [ "${{ github.event.inputs.full_load }}" = "true" ]; then
            dbt run --select silver.* --target $TARGET --full-refresh
          else
            dbt run --select silver.* --target $TARGET --vars "{'incremental_days_back': $INCREMENTAL_DAYS_BACK}"
          fi

  # ---------------------------------------------------------------------------
  # Gold — build Kimball dimensional model (dbt)
  # ---------------------------------------------------------------------------
  gold:
    name: Gold transformation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: transform

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: dbt deps
        working-directory: dbt
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: dbt deps

      - name: Run gold
        working-directory: dbt
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          DB="${{ github.event.inputs.target_db || 'superligaen' }}"
          if [[ "$DB" == "superligaen" ]]; then TARGET=prod
          elif [[ "$DB" == "superligaen_dev" ]]; then TARGET=dev
          else echo "Unknown target_db: $DB" && exit 1; fi
          if [ "${{ github.event.inputs.full_load }}" = "true" ]; then
            dbt run --select gold.* --target $TARGET --full-refresh
          else
            dbt run --select gold.* --target $TARGET --vars "{'incremental_days_back': $INCREMENTAL_DAYS_BACK}"
          fi

  # ---------------------------------------------------------------------------
  # DQ tests — run after gold, block publish if any test fails
  # ---------------------------------------------------------------------------
  dq_tests:
    name: DQ tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: gold

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: dbt deps
        working-directory: dbt
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: dbt deps

      - name: Run DQ tests
        working-directory: dbt
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          DB="${{ github.event.inputs.target_db || 'superligaen' }}"
          if [[ "$DB" == "superligaen" ]]; then TARGET=prod
          elif [[ "$DB" == "superligaen_dev" ]]; then TARGET=dev
          else echo "Unknown target_db: $DB" && exit 1; fi
          dbt test --target $TARGET

      - name: Check source freshness
        working-directory: dbt
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          DB="${{ github.event.inputs.target_db || 'superligaen' }}"
          if [[ "$DB" == "superligaen" ]]; then TARGET=prod
          elif [[ "$DB" == "superligaen_dev" ]]; then TARGET=dev
          else echo "Unknown target_db: $DB" && exit 1; fi
          dbt source freshness --target $TARGET

  # ---------------------------------------------------------------------------
  # Dashboard — push to publish_dashboard/vercel to trigger Vercel rebuild
  # ---------------------------------------------------------------------------
  publish:
    name: Publish dashboard (Vercel)
    runs-on: ubuntu-latest
    needs: dq_tests
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to Vercel deploy branch
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git checkout -B publish_dashboard/vercel origin/main
          git commit --allow-empty -m "chore: nightly data refresh $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin publish_dashboard/vercel --force
