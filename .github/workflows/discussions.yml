name: Bronze ingestion (AI discussions)

on:
  workflow_dispatch:
    inputs:
      season:
        description: "Season to generate discussions for (e.g. 2025/26). Leave empty to use the current season."
        required: false
        default: ""
      all_rounds:
        description: "Set to 'true' to generate discussions for all completed rounds (not just the latest)."
        required: false
        default: "false"
      force:
        description: "Set to 'true' to overwrite existing discussions (re-generates even if already in bronze)."
        required: false
        default: "false"
      target_db:
        description: "Target MotherDuck database (e.g. superligaen). Leave empty to use default (superligaen)."
        required: false
        default: ""

jobs:
  # ---------------------------------------------------------------------------
  # AI discussions — generate fan forum posts
  # ---------------------------------------------------------------------------
  ai_discussions:
    name: AI discussions ingestion
    runs-on: ubuntu-latest
    timeout-minutes: 120  # full-season backfill can take ~45 min per season

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate discussions
        run: |
          DB="${{ github.event.inputs.target_db || 'superligaen' }}"
          if [ -n "${{ github.event.inputs.season }}" ]; then
            SEASON="${{ github.event.inputs.season }}"
          else
            SEASON=$(python -c "import duckdb,os; con=duckdb.connect('md:'+os.environ['DB']+'?motherduck_token='+os.environ['MOTHERDUCK_TOKEN']); row=con.execute('SELECT season FROM '+os.environ['DB']+'.gold.dim_date WHERE is_current_season ORDER BY date DESC LIMIT 1').fetchone(); print(row[0] if row else '')")
          fi
          if [ -z "$SEASON" ]; then echo "No current season found" && exit 1; fi
          echo "Generating discussions for season: $SEASON"
          EXTRA_ARGS=""
          if [ "${{ github.event.inputs.all_rounds }}" = "true" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --all-rounds"
          fi
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --force"
          fi
          python ingestion/groq/generate_round_discussions.py --season "$SEASON" --db "$DB" $EXTRA_ARGS
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          GROQ_API_KEY:     ${{ secrets.GROQ_API_KEY }}
          DB:               ${{ github.event.inputs.target_db || 'superligaen' }}

  # ---------------------------------------------------------------------------
  # LLM models — parse bronze into silver + gold
  # ---------------------------------------------------------------------------
  llm_models:
    name: LLM dbt models
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: ai_discussions

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: dbt deps
        working-directory: dbt
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: dbt deps

      - name: Build LLM silver and gold models
        working-directory: dbt
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          DB="${{ github.event.inputs.target_db || 'superligaen' }}"
          if [[ "$DB" == "superligaen" ]]; then TARGET=prod
          elif [[ "$DB" == "superligaen_dev" ]]; then TARGET=dev
          else echo "Unknown target_db: $DB" && exit 1; fi
          dbt run --select silver.llm_match_discussions gold.fct_match_discussions --target $TARGET

  # ---------------------------------------------------------------------------
  # Dashboard — trigger Vercel rebuild
  # ---------------------------------------------------------------------------
  publish:
    name: Publish dashboard (Vercel)
    runs-on: ubuntu-latest
    needs: llm_models
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to Vercel deploy branch
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git checkout -B publish_dashboard/vercel origin/main
          git commit --allow-empty -m "chore: discussions refresh $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin publish_dashboard/vercel --force
