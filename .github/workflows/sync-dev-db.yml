name: Sync dev database from prod

on:
  workflow_dispatch:
    inputs:
      season:
        description: "Season year(s) to copy into dev — comma-separated (e.g. 2024 or 2023,2024)"
        required: true
        default: "2024"

jobs:
  sync:
    name: Sync dev DB from prod
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Copy superligaen → superligaen_dev
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: python scripts/sync_dev_db.py --season ${{ github.event.inputs.season }}
