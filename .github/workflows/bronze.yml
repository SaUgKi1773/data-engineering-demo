name: Bronze Ingestion

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Load mode"
        required: true
        default: "incremental"
        type: choice
        options:
          - incremental
          - full-load
      leagues:
        description: "League scope (271 = Danish Superliga, 501 = Scottish Premiership)"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - "271"
          - "501"
      seasons:
        description: 'Season names, comma-separated (e.g. "2015/2016,2016/2017"). Empty = all in scope. Use with full-load.'
        required: false
        default: ""
        type: string

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  ingest:
    name: Ingest → MotherDuck
    runs-on: ubuntu-latest
    timeout-minutes: 360   # full load across 16 seasons can take a while

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ingestion
        working-directory: ingestion/sportmonks
        env:
          LEAGUES: ${{ github.event.inputs.leagues }}
          SEASONS: ${{ github.event.inputs.seasons }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.mode }}" = "full-load" ]; then
            ARGS="--mode full"
          else
            ARGS="--mode incremental"
          fi
          if [ -n "$LEAGUES" ] && [ "$LEAGUES" != "all" ]; then
            ARGS="$ARGS --leagues $LEAGUES"
          fi
          SEASONS="${SEASONS// /}"   # "2015/2016, 2016/2017" → no stray word-splits
          if [ -n "$SEASONS" ]; then
            ARGS="$ARGS --seasons $SEASONS"
          fi
          echo "Running: python run.py $ARGS --db md:superligaen"
          python run.py $ARGS --db md:superligaen
        env:
          SPORTMONKS_API_KEY: ${{ secrets.SPORTMONKS_API_KEY }}
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
