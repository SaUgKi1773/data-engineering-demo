[build]
  base = "dashboards"
  command = "npm run sources && npm run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Embedder-Policy = "credentialless"
    Cross-Origin-Opener-Policy = "same-origin"
    Content-Security-Policy = "img-src * 'self' data: https:;"