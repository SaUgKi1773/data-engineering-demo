  </g>
  <circle cx="256" cy="230" r="110" fill="none" stroke="#0B1220" stroke-width="6"/>
  <!-- Neon gradient bars -->
  <rect x="148" y="380" width="30" height="64" rx="6" fill="url(#neon)"/>
  <rect x="196" y="360" width="30" height="84" rx="6" fill="url(#neon)"/>
