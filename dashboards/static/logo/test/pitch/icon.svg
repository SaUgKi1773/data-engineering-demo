<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="tile"><rect x="18" y="18" width="476" height="476" rx="82"/></clipPath>
    <clipPath id="ball"><circle cx="256" cy="230" r="110"/></clipPath>
  </defs>
  <!-- Outer pitch green -->
  <rect width="512" height="512" rx="96" fill="#166534"/>
  <!-- Inner field with mowed vertical stripes -->
  <g clip-path="url(#tile)">
    <rect x="18" y="18" width="476" height="476" fill="#15803D"/>
    <rect x="18"  y="18" width="95" height="476" fill="#16A34A"/>
    <rect x="208" y="18" width="95" height="476" fill="#16A34A"/>
    <rect x="398" y="18" width="96" height="476" fill="#16A34A"/>
  </g>
  <!-- Football -->
  <circle cx="256" cy="230" r="110" fill="white"/>
  <g clip-path="url(#ball)">
    <polygon points="256,145 290,170 278,208 234,208 222,170" fill="#166534"/>
    <polygon points="366,185 380,220 350,244 322,228 326,192" fill="#166534"/>
    <polygon points="328,295 344,330 316,352 286,336 284,300" fill="#166534"/>
    <polygon points="184,295 168,330 196,352 226,336 228,300" fill="#166534"/>
    <polygon points="146,185 186,192 190,228 162,244 132,220" fill="#166534"/>
  </g>
  <circle cx="256" cy="230" r="110" fill="none" stroke="#166534" stroke-width="6"/>
  <!-- White analytics bars -->
  <rect x="148" y="380" width="30" height="64" rx="6" fill="white"/>
  <rect x="196" y="360" width="30" height="84" rx="6" fill="white"/>
  <rect x="244" y="340" width="30" height="104" rx="6" fill="white"/>
  <rect x="292" y="355" width="30" height="89" rx="6" fill="white"/>
  <rect x="340" y="370" width="30" height="74" rx="6" fill="white"/>
</svg>
