version: 2

models:
  - name: dim_team
    columns:
      - name: team_sk
        tests: [not_null, unique]
      - name: team_id
        tests:
          - not_null:
              config: {where: "team_sk > 0"}
          - unique:
              config: {where: "team_sk > 0"}
      - name: team_name
        tests: [not_null]
      - name: team_code
        tests:
          - not_null:
              config: {where: "team_sk > 0"}
      - name: team_short_name
        tests:
          - not_null:
              config: {where: "team_sk > 0"}

  - name: dim_opponent_team
    columns:
      - name: opponent_team_sk
        tests: [not_null, unique]
      - name: opponent_team_name
        tests: [not_null]

  - name: dim_match
    columns:
      - name: match_sk
        tests: [not_null, unique]
      - name: match_id
        tests:
          - not_null:
              config: {where: "match_sk > 0"}
          - unique:
              config: {where: "match_sk > 0"}
      - name: match_name
        tests:
          - not_null:
              config: {where: "match_sk > 0"}

  - name: dim_player
    columns:
      - name: player_sk
        tests: [not_null, unique]
      - name: player_id
        tests:
          - not_null:
              config: {where: "player_sk > 0"}
          - unique:
              config: {where: "player_sk > 0"}
      - name: player_main_position
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Goalkeeper', 'Defender', 'Midfielder', 'Attacker', 'Unknown Main Position', 'Not Applicable Main Position']

  - name: dim_referee
    columns:
      - name: referee_sk
        tests: [not_null, unique]
      - name: referee_id
        tests:
          - not_null:
              config: {where: "referee_sk > 0"}
          - unique:
              config: {where: "referee_sk > 0"}

  - name: dim_coach
    columns:
      - name: coach_sk
        tests: [not_null, unique]
      - name: coach_id
        tests:
          - not_null:
              config: {where: "coach_sk > 0"}
          - unique:
              config: {where: "coach_sk > 0"}

  - name: dim_stadium
    columns:
      - name: stadium_sk
        tests: [not_null, unique]
      - name: stadium_id
        tests:
          - not_null:
              config: {where: "stadium_sk > 0"}
          - unique:
              config: {where: "stadium_sk > 0"}

  - name: dim_league
    columns:
      - name: league_sk
        tests: [not_null, unique]
      - name: league_id
        tests:
          - not_null:
              config: {where: "league_sk > 0"}
          - unique:
              config: {where: "league_sk > 0"}

  - name: dim_formation
    columns:
      - name: formation_sk
        tests: [not_null, unique]

  - name: dim_position
    columns:
      - name: position_sk
        tests: [not_null, unique]
      - name: position_name
        tests: [not_null, unique]

  - name: dim_appearance_type
    columns:
      - name: appearance_type_sk
        tests: [not_null, unique]

  - name: dim_match_result
    columns:
      - name: match_result_sk
        tests: [not_null, unique]
      - name: match_result
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Win', 'Draw', 'Loss', 'Pending', 'Unknown Match Result', 'Not Applicable Match Result']

  - name: dim_team_side
    columns:
      - name: team_side_sk
        tests: [not_null, unique]
      - name: team_side
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Home', 'Away', 'Unknown Team Side', 'Not Applicable Team Side']

  - name: dim_date
    columns:
      - name: date_sk
        tests: [not_null, unique]
      - name: date
        tests: [not_null, unique]

  - name: dim_time
    columns:
      - name: time_sk
        tests: [not_null, unique]

  - name: dim_transfer_partner_team
    columns:
      - name: transfer_partner_team_sk
        tests: [not_null, unique]
      - name: transfer_partner_team_name
        tests: [not_null]

  - name: dim_transfer_type
    columns:
      - name: transfer_type_sk
        tests: [not_null, unique]
      - name: transfer_type_name
        tests: [not_null]
      - name: transfer_direction
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Incoming', 'Outgoing', 'Unknown', 'Not Applicable']

  - name: dim_match_event_type
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [event_type_code, event_sub_type_code]
    columns:
      - name: match_event_type_sk
        tests: [not_null, unique]
      - name: event_group
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Goal', 'Missed Penalty', 'Card', 'Substitution', 'VAR', 'Unknown Event Group', 'Not Applicable Event Group']
      - name: event_type_name
        tests: [not_null]
      - name: event_sub_type_name
        tests: [not_null]

  - name: dim_match_minute
    columns:
      - name: match_minute_sk
        tests: [not_null, unique]
      - name: minute_label
        tests: [not_null, unique]
      - name: stoppage_offset
        tests:
          - not_null:
              config: {where: "match_minute_sk > 0"}
      - name: period_name
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['First Half', 'Second Half', 'Extra Time', 'Unknown Period', 'Not Applicable Period']
      - name: minute_of_match
        tests:
          - not_null:
              config: {where: "match_minute_sk > 0"}
      - name: minute_type
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Regulation', 'Stoppage', 'Unknown Minute Type', 'Not Applicable Minute Type']
      - name: minute_bucket
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['0-15', '16-30', '31-45', '45+', '46-60', '61-75', '76-90', '90+', 'Extra Time', 'Unknown Minute Bucket', 'Not Applicable Minute Bucket']

  - name: dim_transfer_status
    columns:
      - name: transfer_status_sk
        tests: [not_null, unique]
      - name: transfer_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Completed', 'Pending', 'Unknown Transfer Status', 'Not Applicable Transfer Status']
