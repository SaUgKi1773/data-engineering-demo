version: 2

models:
  - name: fct_team_matches
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [match_sk, team_side_sk]
    columns:
      - name: match_sk
        tests: [not_null]
      - name: team_sk
        tests: [not_null]
      - name: opponent_team_sk
        tests: [not_null]
      - name: team_side_sk
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, 2, -1, -2]
      - name: match_result_sk
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4, -1, -2]
      - name: goals_scored
        tests:
          - not_null:
              config:
                where: "match_result_sk IN (1, 2, 3)"
      - name: goals_conceded
        tests:
          - not_null:
              config:
                where: "match_result_sk IN (1, 2, 3)"
      - name: league_sk
        tests: [not_null]

  - name: fct_match_predictions
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [match_sk, team_side_sk]
    columns:
      - name: date_sk
        tests: [not_null]
      - name: team_sk
        tests: [not_null]
      - name: opponent_team_sk
        tests: [not_null]
      - name: league_sk
        tests: [not_null]
      - name: match_sk
        tests: [not_null]
      - name: team_side_sk
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, 2]
      - name: win_probability
        tests: [not_null]
      - name: draw_probability
        tests: [not_null]
      - name: loss_probability
        tests: [not_null]
      - name: goals_expected_scored
        tests: [not_null]
      - name: goals_expected_conceded
        tests: [not_null]
      - name: points_expected
        tests: [not_null]
      - name: model_version
        tests: [not_null]
      - name: predicted_at
        tests: [not_null]

  - name: fct_match_discussions
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [match_sk, persona_sk]
    columns:
      - name: match_sk
        tests: [not_null]
      - name: persona_sk
        tests: [not_null]
      - name: date_sk
        tests: [not_null]
      - name: message
        tests: [not_null]
      - name: league_sk
        tests: [not_null]

  - name: fct_team_transfers
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [transfer_id, team_sk]
    columns:
      - name: transfer_id
        tests: [not_null]
      - name: team_sk
        tests: [not_null]
      - name: transfer_partner_team_sk
        tests: [not_null]
      - name: player_sk
        tests: [not_null]
      - name: transfer_type_sk
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4, 5, 6, 7, 8, 9, -1, -2]
      - name: transfer_status_sk
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, 2, -1, -2]
      - name: transfer_count
        tests: [not_null]

  - name: fct_player_appearances
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [match_sk, player_sk, team_sk]
    columns:
      - name: match_sk
        tests: [not_null]
      - name: player_sk
        tests: [not_null]
      - name: team_sk
        tests: [not_null]
      - name: team_side_sk
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, 2, -1, -2]
      - name: match_result_sk
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, 2, 3, -1, -2]
      - name: appearance_type_sk
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, 2, -1, -2]
      - name: minutes_played
        tests: [not_null]
      - name: league_sk
        tests: [not_null]
